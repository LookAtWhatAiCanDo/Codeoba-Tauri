name: Package Desktop Application

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  ESAXX_DYNAMIC_LINK: '1'
  CARGO_NET_RETRY: 10
  SKIP_STAPLING: 'false'

jobs:
  build:
    name: Build & Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    environment: ${{ startsWith(github.ref, 'refs/tags/v') && 'Production' || null }}
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: universal-apple-darwin
            artifact-path: |
              src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
              src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
              src-tauri/target/universal-apple-darwin/release/latest.json
            artifact-path-pkg: 'src-tauri/target/universal-apple-darwin/release/bundle/macos/*.pkg'
            platform: macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact-path: |
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi.zip
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi.zip.sig
              src-tauri/target/x86_64-pc-windows-msvc/release/latest.json
            platform: windows-x64

          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            artifact-path: |
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb.tar.gz
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb.tar.gz.sig
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm.tar.gz
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm.tar.gz.sig
              src-tauri/target/x86_64-unknown-linux-gnu/release/latest.json
            platform: linux-x64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact-path: |
              src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/deb/*.deb
              src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/deb/*.deb.tar.gz
              src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/deb/*.deb.tar.gz.sig
              src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/rpm/*.rpm
              src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/rpm/*.rpm.tar.gz
              src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/rpm/*.rpm.tar.gz.sig
              src-tauri/target/aarch64-unknown-linux-gnu/release/latest.json
            platform: linux-arm64

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Sync version and configure updater
        if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
        env:
          CODEOBA_TAURI_UPDATE_PUBLIC_KEY_DEV: ${{ vars.CODEOBA_TAURI_UPDATE_PUBLIC_KEY_DEV }}
          CODEOBA_TAURI_UPDATE_PUBLIC_KEY_PROD: ${{ vars.CODEOBA_TAURI_UPDATE_PUBLIC_KEY_PROD }}
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            node scripts/sync-version.cjs
          else
            node scripts/sync-version.cjs --dev ${{ github.run_number }}
          fi

      - name: Set version output
        id: get_version
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust Targets
        run: |
          if [[ "${{ matrix.platform }}" == "macos" ]]; then
            rustup target add x86_64-apple-darwin aarch64-apple-darwin
          elif [[ "${{ matrix.target }}" != "" ]]; then
            rustup target add ${{ matrix.target }}
          fi

      - name: Cache Cargo Dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          prefix-key: ${{ hashFiles('.github/workflows/build-desktop.yml') }}

      - name: Install Linux System Dependencies
        if: startsWith(matrix.platform, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm \
            xdg-utils

      - name: Install Node Modules
        run: npm ci

      - name: Install Apple Certificate
        if: matrix.platform == 'macos' && startsWith(github.ref, 'refs/tags/v')
        env:
          P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          INSTALLER_P12_BASE64: ${{ secrets.MACOS_INSTALLER_CERTIFICATE_P12 }}
          INSTALLER_P12_PASSWORD: ${{ secrets.MACOS_INSTALLER_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: "temporary_keychain_password"
        run: |
          if [ -z "$P12_BASE64" ]; then
            echo "No signing certificate secret (MACOS_CERTIFICATE_P12) found. Skipping macOS code signing setup."
            exit 0
          fi

          echo "Initializing macOS temporary keychain..."
          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          INSTALLER_CERT_PATH=$RUNNER_TEMP/installer_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Decode certificates
          echo -n "$P12_BASE64" | base64 --decode > "$CERT_PATH"
          if [ -n "$INSTALLER_P12_BASE64" ]; then
            echo "Installer certificate secret detected. Decoding installer cert..."
            echo -n "$INSTALLER_P12_BASE64" | base64 --decode > "$INSTALLER_CERT_PATH"
          fi

          # Create keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import Developer ID Application cert
          echo "Importing Developer ID Application certificate..."
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign

          # Import Developer ID Installer cert if provided
          if [ -n "$INSTALLER_P12_BASE64" ]; then
            echo "Importing Developer ID Installer certificate..."
            echo "MACOS_INSTALLER_PRESENT=true" >> $GITHUB_ENV
            security import "$INSTALLER_CERT_PATH" -k "$KEYCHAIN_PATH" -P "$INSTALLER_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign
          fi

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          
          # Expose signing identity dynamically (strip the prefix so it matches both Application and Installer certs)
          echo "Resolving certificate signing identity..."
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -o 'Developer ID Application: [^"]*' | head -n 1 | sed 's/Developer ID Application: //')
          
          if [ -z "$IDENTITY" ]; then
            echo "WARNING: Could not resolve a valid Developer ID Application certificate identity!"
          else
            echo "Successfully resolved macOS Signing Identity: $IDENTITY"
            echo "MACOS_SIGNING_IDENTITY=$IDENTITY" >> $GITHUB_ENV
          fi

      - name: Build Tauri Application
        env:
          APPLE_SIGNING_IDENTITY: ${{ env.MACOS_SIGNING_IDENTITY }}
          APPLE_ID: ${{ vars.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
          CODEOBA_TAURI_UPDATE_PRIVATE_KEY_DEV: ${{ secrets.CODEOBA_TAURI_UPDATE_PRIVATE_KEY_DEV }}
          CODEOBA_TAURI_UPDATE_PRIVATE_KEY_PASSWORD_DEV: ${{ secrets.CODEOBA_TAURI_UPDATE_PRIVATE_KEY_PASSWORD_DEV }}
          CODEOBA_TAURI_UPDATE_PRIVATE_KEY_PROD: ${{ secrets.CODEOBA_TAURI_UPDATE_PRIVATE_KEY_PROD }}
          CODEOBA_TAURI_UPDATE_PRIVATE_KEY_PASSWORD_PROD: ${{ secrets.CODEOBA_TAURI_UPDATE_PRIVATE_KEY_PASSWORD_PROD }}
        run: |
          if [[ "${{ matrix.platform }}" == "macos" ]]; then
            echo "macOS platform detected. Resolving active SDK and toolchain paths..."
            CLANG_RT_DIR=$(dirname $(find $(xcode-select -p) -name "libclang_rt.osx.a" | head -n 1))
            if [ -n "$CLANG_RT_DIR" ]; then
              echo "Adding Clang runtime directory to LIBRARY_PATH: $CLANG_RT_DIR"
              export LIBRARY_PATH="$CLANG_RT_DIR:$LIBRARY_PATH"
            else
              echo "WARNING: Could not locate libclang_rt.osx.a"
            fi
          fi

          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            echo "Release tag detected. Building signed/notarized production binaries..."
            export TAURI_SIGNING_PRIVATE_KEY="$CODEOBA_TAURI_UPDATE_PRIVATE_KEY_PROD"
            export TAURI_SIGNING_PRIVATE_KEY_PASSWORD="$CODEOBA_TAURI_UPDATE_PRIVATE_KEY_PASSWORD_PROD"
            TAURI_ARGS="--verbose"
            if [[ "$SKIP_STAPLING" == "true" ]]; then
              TAURI_ARGS="$TAURI_ARGS --skip-stapling"
            fi
            TAURI_ARGS="$TAURI_ARGS --target ${{ matrix.target }}"
            npm run tauri build -- $TAURI_ARGS
          elif [[ $GITHUB_REF == refs/heads/main ]]; then
            echo "Main branch push detected. Building signed development/staging binaries..."
            export TAURI_SIGNING_PRIVATE_KEY="$CODEOBA_TAURI_UPDATE_PRIVATE_KEY_DEV"
            export TAURI_SIGNING_PRIVATE_KEY_PASSWORD="$CODEOBA_TAURI_UPDATE_PRIVATE_KEY_PASSWORD_DEV"
            unset APPLE_SIGNING_IDENTITY
            unset APPLE_ID
            unset APPLE_PASSWORD
            unset APPLE_TEAM_ID
            npm run tauri build -- --target ${{ matrix.target }}
          else
            echo "Standard commit. Building unsigned development package..."
            unset APPLE_SIGNING_IDENTITY
            unset APPLE_ID
            unset APPLE_PASSWORD
            unset APPLE_TEAM_ID
            npm run tauri build -- --target ${{ matrix.target }} --config '{"bundle": {"createUpdaterArtifacts": false}}'
          fi

      - name: Azure Login
        if: startsWith(matrix.platform, 'windows') && startsWith(github.ref, 'refs/tags/v')
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign MSI installer with Azure Artifact Signing
        if: startsWith(matrix.platform, 'windows') && startsWith(github.ref, 'refs/tags/v')
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ vars.AZURE_TRUSTED_SIGNING_ENDPOINT || 'https://cus.codesigning.azure.net/' }}
          signing-account-name: ${{ vars.AZURE_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ vars.AZURE_CERTIFICATE_PROFILE_NAME }}
          files-folder: 'src-tauri/target/${{ matrix.target }}/release/bundle/msi'
          files-folder-filter: 'msi'
          file-digest: 'SHA512'
          timestamp-digest: 'SHA512'
          timestamp-rfc3161: 'http://timestamp.acs.microsoft.com'

      - name: Import GPG Key for Linux signing
        id: import-gpg
        if: startsWith(matrix.platform, 'linux') && startsWith(github.ref, 'refs/tags/v')
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.LINUX_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.LINUX_GPG_PASSPHRASE }}

      - name: Sign Debian and RPM packages with GPG
        if: startsWith(matrix.platform, 'linux') && startsWith(github.ref, 'refs/tags/v')
        run: |
          # Sign DEB package
          sudo apt-get update && sudo apt-get install -y dpkg-sig
          DEB_FILE=$(find src-tauri/target/${{ matrix.target }}/release/bundle/deb -name "*.deb" | head -n 1)
          if [ -n "$DEB_FILE" ]; then
            echo "Signing Debian package: $DEB_FILE"
            dpkg-sig --sign builder "$DEB_FILE"
          else
            echo "No Debian package found to sign."
          fi
          
          # Sign RPM package
          RPM_FILE=$(find src-tauri/target/${{ matrix.target }}/release/bundle/rpm -name "*.rpm" | head -n 1)
          if [ -n "$RPM_FILE" ]; then
            echo "Signing RPM package: $RPM_FILE"
            # Import GPG key to RPM db
            gpg --export --armor > /tmp/gpg-pubkey.asc
            sudo rpm --import /tmp/gpg-pubkey.asc
            
            # Configure rpmmacros for signing
            echo "%_signature gpg" > ~/.rpmmacros
            echo "%_gpg_path ~/.gnupg" >> ~/.rpmmacros
            echo "%_gpg_name ${{ steps.import-gpg.outputs.keyid }}" >> ~/.rpmmacros
            echo "%__gpg /usr/bin/gpg" >> ~/.rpmmacros
            
            # Run rpmsign (bypass passphrase prompt by defining macro)
            rpm --define "_gpg_passphrase ${{ secrets.LINUX_GPG_PASSPHRASE }}" --addsign "$RPM_FILE"
          else
            echo "No RPM package found to sign."
          fi

      - name: Clean Up Credentials
        if: always() && matrix.platform == 'macos' && startsWith(github.ref, 'refs/tags/v')
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm -f $RUNNER_TEMP/build_certificate.p12 || true
          rm -f $RUNNER_TEMP/installer_certificate.p12 || true

      - name: Upload Main Package Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Codeoba-${{ matrix.platform }}-package
          path: ${{ matrix.artifact-path }}
          retention-days: 7

      - name: Upload PKG Package Artifact (macOS only)
        if: matrix.platform == 'macos' && hashFiles(format('src-tauri/target/{0}/release/bundle/macos/*.pkg', matrix.target)) != ''
        uses: actions/upload-artifact@v7
        with:
          name: Codeoba-Tauri-macos-pkg
          path: ${{ matrix.artifact-path-pkg }}
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Prune old dev pre-releases
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/prune-dev-releases.cjs v${{ needs.build.outputs.version }}

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Merge Platform Updater Manifests
        run: node scripts/merge-updater-manifests.cjs artifacts v${{ needs.build.outputs.version }}

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.build.outputs.version }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.pkg
            artifacts/**/*.msi
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.app.tar.gz
            artifacts/**/*.app.tar.gz.sig
            artifacts/**/*.msi.zip
            artifacts/**/*.msi.zip.sig
            artifacts/**/*.deb.tar.gz
            artifacts/**/*.deb.tar.gz.sig
            artifacts/**/*.rpm.tar.gz
            artifacts/**/*.rpm.tar.gz.sig
            artifacts/latest.json
          draft: false
          generate_release_notes: true
